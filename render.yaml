services:
  - type: web
    name: goalflow
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:///./goalflow.db
    disk:
      name: goalflow-data
      mountPath: /data
      sizeGB: 1
